[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback so React Router (BrowserRouter) routes resolve on refresh / direct hit.
#
# Edge function netlify/edge-functions/embed-meta.ts customizes OG/twitter meta for crawlers on:
#   /invite/friend/* , /hangouts?hangout=… , /profile?memory=…
# Set SUPABASE_URL and SUPABASE_ANON_KEY on Netlify (Site settings → Environment variables).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache hashed Vite assets aggressively (filenames are content-hashed).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache the HTML shell so updates roll out immediately.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Basic security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self), camera=(), microphone=()"
